<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Website</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        header {
            background: #333;
            color: white;
            padding: 15px;
            text-align: center;
        }

        nav {
            display: flex;
            justify-content: center;
            background: #555;
        }

        nav a {
            color: white;
            padding: 14px 20px;
            text-decoration: none;
        }

        nav a:hover {
            background: #ddd;
            color: black;
        }

        .container {
            padding: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            margin: 15px 0;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        footer {
            text-align: center;
            padding: 10px;
            background: #333;
            color: white;
            position: fixed;
            bottom: 0;
            width: 100%;
        }

        button {
            padding: 10px 15px;
            background: #007BFF;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }
    </style>
</head>

<body>

<header>
    <h1>My Demo Website</h1>
    <p>Welcome to your first HTML page 🚀</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
</nav>

<div class="container">

    <div class="card">
        <h2>About Me</h2>
        <p>This is a simple demo HTML page to learn structure and styling.</p>
        <button onclick="showMessage()">Click Me</button>
    </div>

    <div class="card">
        <h2>Services</h2>
        <ul>
            <li>Web Development</li>
            <li>UI/UX Design</li>
            <li>Cloud Projects</li>
        </ul>
    </div>

</div>

<footer>
    <p>© 2026 My Website | All Rights Reserved</p>
</footer>

<script>
    function showMessage() {
        alert("Hello Mohit! 👋 Welcome to your demo site.");
    }
</script>

</body>
</html>
